<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mirkarim Bahodirovich — Frontend dasturchi | React, Next.js, Tailwind CSS" />
    <meta name="theme-color" content="#f4f6f9" />

    <!-- ✅ Critical inline styles for first paint and skip link. -->
    <style>
      :root { color-scheme: light dark; }
      html { min-height: 100%; scroll-behavior: smooth; }
      body { margin: 0; min-height: 100vh; background: #f4f6f9; color: #2a3a4d; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow-x: hidden; }
      .skip-to-content { position: absolute; top: -4rem; left: 0; background: rgba(17, 24, 39, 0.95); color: #f8fafc; padding: 0.75rem 1rem; z-index: 999; transition: top 0.25s ease; text-decoration: none; font-size: 0.95rem; }
      .skip-to-content:focus { top: 0; }
      .animate-cursor { display: inline-block; width: 1px; height: 1.15em; background: currentColor; animation: blink 1s step-end infinite; margin-left: 0.35rem; vertical-align: middle; }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>

    <!-- ✅ LCP image preload — hero avatar -->
    <link
      rel="preload"
      as="image"
      href="/Cmcoder.webp"
      type="image/webp"
      fetchpriority="high"
    />

    <!-- ✅ OG meta tags -->
    <meta property="og:title" content="Mirkarim Bahodirovich | Frontend Developer" />
    <meta property="og:description" content="Junior Frontend Developer — React, Next.js, Tailwind CSS mutaxassisi." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mirkarim-dev.vercel.app/" />

    <title>Mirkarim Bahodirovich | Frontend dasturchi</title>
  </head>
  <body>
    <a class="skip-to-content" href="#hero">Asosiy mazmunга o'tish</a>
    <!-- ✅ Theme script — FOUC oldini oladi -->
    <script>
      (function () {
        var s = localStorage.getItem('portfolio-theme');
        var d = s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (d) document.documentElement.classList.add('dark');
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
